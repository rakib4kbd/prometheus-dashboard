modules:
  http_default:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0", "HTTP/3.0"]
      follow_redirects: true
      valid_status_codes:
        - 200
        - 301
        - 302
        - 307
        - 308
      tls_config:
        insecure_skip_verify: true
      preferred_ip_protocol: "ip4" # defaults to "ip6"
      ip_protocol_fallback: false # no fallback to "ip6"
